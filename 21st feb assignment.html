<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyage - Responsive Hero</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root {
    --primary: #ff7a18;
    --secondary: #ffb347;
    --dark: #1f2937;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #1f2937, #111827);
    color: white;
    transition: 0.4s ease;
}

/* MOBILE PREVIEW SIMULATION */
.mobile-preview {
    max-width: 375px;
    margin: 20px auto;
    border: 6px solid white;
    border-radius: 30px;
    overflow: hidden;
}

/* TOGGLE BUTTON */
.toggle-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--primary);
    padding: 12px 22px;
    border-radius: 30px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.toggle-btn:hover {
    background: var(--secondary);
}

/* HERO SECTION */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 80px 10%;
    gap: 60px;
    transition: 0.4s ease;
}

/* LEFT SIDE */
.hero-text {
    flex: 1;
}

.hero-text h1 {
    font-size: 50px;
    margin-bottom: 20px;
}

.hero-text span {
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero-text p {
    font-size: 18px;
    margin-bottom: 30px;
    opacity: 0.85;
}

.hero-buttons {
    display: flex;
    gap: 20px;
}

.hero-buttons a {
    padding: 14px 30px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s ease;
}

.btn-primary {
    background: var(--primary);
    color: white;
}

.btn-primary:hover {
    background: var(--secondary);
}

.btn-secondary {
    border: 2px solid var(--primary);
    color: var(--primary);
}

.btn-secondary:hover {
    background: var(--primary);
    color: white;
}

/* RIGHT SIDE */
.hero-image {
    flex: 1;
    display: flex;
    justify-content: center;
}

.hero-image img {
    width: 100%;
    max-width: 450px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* RESPONSIVE */
@media (max-width: 900px) {

    .hero {
        flex-direction: column;
        text-align: center;
    }

    .hero-text h1 {
        font-size: 36px;
    }

    .hero-buttons {
        justify-content: center;
        flex-wrap: wrap;
    }
}

</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleMobile()">Toggle Mobile View</button>

<div id="preview-wrapper">

<section class="hero">

    <div class="hero-text">
        <h1>Explore The World With <span>Voyage</span></h1>
        <p>
            Discover breathtaking destinations, curated travel experiences,
            and unforgettable adventures tailored just for you.
        </p>

        <div class="hero-buttons">
            <a href="#" class="btn-primary">Start Exploring</a>
            <a href="#" class="btn-secondary">View Packages</a>
        </div>
    </div>

    <div class="hero-image">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="Travel">
    </div>

</section>

</div>

<script>
function toggleMobile() {
    const wrapper = document.getElementById("preview-wrapper");
    wrapper.classList.toggle("mobile-preview");
}
</script>

</body>
</html>
